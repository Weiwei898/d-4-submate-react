name: Deploy SubMate to GitHub Pages # 自動化流程的名稱

on:
  push:
    branches: ["main"] # 只有在 main 分支有變動時才觸發

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest # 使用雲端的虛擬機跑 (Ubuntu 系統)
    steps:
      - name: Checkout # 第一步：把你的程式碼抓到雲端機器上
        uses: actions/checkout@v4

      - name: Set up Node # 第二步：安裝 Node.js 環境
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install & Build # 第三步：安裝套件並執行打包
        run: |
          npm install
          npm run lint
          npm run build

      - name: Deploy # 第四步：將 dist 資料夾推送到 gh-pages 分支
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }} # 自動獲取權限
          publish_dir: ./dist # 指定要上傳的資料夾